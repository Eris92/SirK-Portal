name: Hotfix 1.8.1 syntax
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/hotfix-1.8.1-trigger
      - .github/workflows/hotfix-1.8.1.yml
permissions:
  contents: write
jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Repair generated JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          app = Path('public/portal/standalone/scripts/app.js')
          text = app.read_text(encoding='utf-8')
          old = ''''<span class="sirk-health-badge is-' + itemStatus '">' + escapeHtml(statusText)'''
          new = ''''<span class="sirk-health-badge is-' + itemStatus + '">' + escapeHtml(statusText)'''
          if old not in text:
              raise SystemExit('Expected app.js corruption was not found')
          app.write_text(text.replace(old, new), encoding='utf-8')

          icons = Path('public/shared/icon-registry.js')
          text = icons.read_text(encoding='utf-8')
          old = '''return '<svg class="' + safeClass" viewBox="0 0 24 24" aria-hidden="' + (safeTitle ? "false" : "true") + '">' +'''
          new = '''return '<svg class="' + safeClass + '" viewBox="0 0 24 24" aria-hidden="' + (safeTitle ? "false" : "true") + '">' +'''
          if old not in text:
              raise SystemExit('Expected icon-registry.js corruption was not found')
          icons.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Set stable version
        run: |
          node - <<'NODE'
          const fs = require('fs');
          for (const file of ['config.json', 'package.json']) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.version = '1.8.1';
            if (file === 'config.json') {
              data.changelogUrl = 'https://raw.githubusercontent.com/Eris92/SIRK-Portal/main/changelog.md';
              data.configUrl = 'https://raw.githubusercontent.com/Eris92/SIRK-Portal/main/config.json';
              data.downloadUrl = 'https://codeload.github.com/Eris92/SIRK-Portal/zip/refs/heads/main';
              data.versionHistoryUrl = 'https://raw.githubusercontent.com/Eris92/SIRK-Portal/main/version-history.json';
            }
            fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
          }
          const history = JSON.parse(fs.readFileSync('version-history.json', 'utf8'));
          history.unshift({version:'1.8.1',date:'2026-07-24',changes:['Fix JavaScript syntax damaged by the global class migration','Restore Portal startup and icon registry','Validate every JavaScript file before publishing']});
          fs.writeFileSync('version-history.json', JSON.stringify(history, null, 2) + '\n');
          const changelog = fs.readFileSync('changelog.md', 'utf8');
          fs.writeFileSync('changelog.md', '## 1.8.1\n\n- Fixed JavaScript syntax damaged by the global class migration.\n- Restored Portal startup and icon rendering.\n- Added full JavaScript syntax validation before publishing.\n\n' + changelog);
          NODE
      - name: Validate JavaScript syntax
        shell: bash
        run: |
          find . -type f -name '*.js' -not -path './node_modules/*' -print0 | xargs -0 -n1 node --check
      - name: Commit stable hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "hotfix: restore Portal JavaScript in 1.8.1"
          git push origin HEAD:main
