name: Apply MyCompany 1.5.84

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-1.5.84.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply both fixes
        run: python3 .release/apply_1_5_84.py
      - name: Validate
        run: npm test
      - name: Publish release commit
        run: |
          rm -rf .release
          rm -f .github/workflows/apply-1.5.84.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: publish MyCompany 1.5.84"
          git push origin HEAD:main
