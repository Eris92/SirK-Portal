name: Sync original plugin seeds

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/sync-seeds.yml"
      - "seed/SOURCES.json"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MyCompany
        uses: actions/checkout@v4
        with:
          path: MyCompany
          fetch-depth: 0

      - name: Checkout MyScripts
        uses: actions/checkout@v4
        with:
          repository: Eris92/MeshCentral-MyScripts
          ref: main
          path: Sources/MyScripts

      - name: Checkout MyCommands
        uses: actions/checkout@v4
        with:
          repository: Eris92/MeshCentral-MyCommands
          ref: main
          path: Sources/MyCommands

      - name: Replace seed libraries
        shell: bash
        run: |
          set -euo pipefail

          test -d Sources/MyScripts/scripts
          test -d Sources/MyCommands/scripts

          rm -rf MyCompany/seed/MyScripts MyCompany/seed/MyCommands
          mkdir -p MyCompany/seed/MyScripts MyCompany/seed/MyCommands

          cp -a Sources/MyScripts/scripts/. MyCompany/seed/MyScripts/
          cp -a Sources/MyCommands/scripts/. MyCompany/seed/MyCommands/

          myscripts_files="$(find MyCompany/seed/MyScripts -type f | wc -l)"
          mycommands_files="$(find MyCompany/seed/MyCommands -type f | wc -l)"

          test "$myscripts_files" -gt 0
          test "$mycommands_files" -gt 0

          echo "MyScripts files:  $myscripts_files"
          echo "MyCommands files: $mycommands_files"

          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          root = Path("MyCompany")
          source_file = root / "seed" / "SOURCES.json"
          data = json.loads(source_file.read_text(encoding="utf-8"))

          def sha(repo):
              return subprocess.check_output(
                  ["git", "-C", repo, "rev-parse", "HEAD"],
                  text=True
              ).strip()

          data["sources"]["MyScripts"]["commit"] = sha("Sources/MyScripts")
          data["sources"]["MyCommands"]["commit"] = sha("Sources/MyCommands")
          source_file.write_text(
              json.dumps(data, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Validate repository
        working-directory: MyCompany
        run: npm test

      - name: Commit synchronized seeds
        working-directory: MyCompany
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- seed; then
            echo "Seed libraries are already synchronized."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seed
          git commit -m "Sync seed libraries from original plugins [skip ci]"
          git push
