name: Test

on:
  push:
    branches: [main, cleanup/unified-portal-classes]
  pull_request:

permissions:
  contents: write

jobs:
  stable-hotfix-182:
    if: github.event_name == 'pull_request' && github.head_ref == 'trigger/hotfix-1.8.2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Repair Settings and JavaScript
        run: |
          python3 - <<'PY'
          from pathlib import Path
          management = Path('public/portal/management.js')
          text = management.read_text(encoding='utf-8')
          broken = "(script.requiresApproval ? ' sirk-script-approval-icon' : '')\">'"
          fixed = "(script.requiresApproval ? ' sirk-script-approval-icon' : '') + '\">'"
          if broken in text:
              management.write_text(text.replace(broken, fixed), encoding='utf-8')

          updates = Path('public/portal/system-updates.js')
          text = updates.read_text(encoding='utf-8')
          start = text.index('    function settingsLayout(host) {')
          end = text.index('    function installSettingsIntegration() {', start)
          replacement = '''    function settingsLayout(host) {
              if (!host || host.getAttribute("data-system-settings-ready") === "1") return;
              host.setAttribute("data-system-settings-ready", "1");
              var original = document.createElement("div");
              original.className = "sirk-settings-original";
              while (host.firstChild) original.appendChild(host.firstChild);
              var shell = document.createElement("section");
              shell.className = "sirk-standalone-view-scroll";
              shell.innerHTML = '<div class="sirk-toolbar-host"><div class="sirk-toolbar"><strong>Ustawienia</strong></div></div>' +
                  '<div class="sirk-layout-host"><div class="sirk-layout"><aside class="sirk-column-primary">' +
                  '<button type="button" class="sirk-nav-item is-active" data-settings-group="portal">Portal</button>' +
                  '<button type="button" class="sirk-nav-item" data-settings-group="system">System</button></aside>' +
                  '<aside class="sirk-column-secondary" data-settings-secondary></aside>' +
                  '<div class="sirk-column-details" data-settings-details></div></div></div>';
              host.appendChild(shell);
              var secondary = shell.querySelector("[data-settings-secondary]");
              var details = shell.querySelector("[data-settings-details]");
              function selectGroup(group) {
                  Array.prototype.forEach.call(shell.querySelectorAll("[data-settings-group]"), function (item) {
                      item.classList.toggle("is-active", item.getAttribute("data-settings-group") === group);
                  });
                  secondary.innerHTML = "";
                  details.innerHTML = "";
                  if (group === "system") {
                      secondary.innerHTML = '<button type="button" class="sirk-nav-item is-active" data-system-section="updates">Aktualizacje</button>' +
                          '<button type="button" class="sirk-nav-item" data-system-section="backups">Backupy</button>' +
                          '<button type="button" class="sirk-nav-item" data-system-section="history">Historia</button>' +
                          '<button type="button" class="sirk-nav-item" data-system-section="channel">Kanał aktualizacji</button>';
                      mount(details, "updates");
                  } else {
                      details.appendChild(original);
                  }
              }
              shell.addEventListener("click", function (event) {
                  var group = event.target.closest("[data-settings-group]");
                  if (group) { selectGroup(group.getAttribute("data-settings-group")); return; }
                  var button = event.target.closest("[data-system-section]");
                  if (!button) return;
                  Array.prototype.forEach.call(shell.querySelectorAll("[data-system-section]"), function (item) {
                      item.classList.toggle("is-active", item === button);
                  });
                  mount(details, button.getAttribute("data-system-section"));
              });
              selectGroup("portal");
          }

'''
          updates.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY
      - name: Set Stable 1.8.2
        run: |
          node - <<'NODE'
          const fs = require('fs');
          for (const file of ['config.json', 'package.json']) {
            const data = JSON.parse(fs.readFileSync(file, 'utf8'));
            data.version = '1.8.2';
            fs.writeFileSync(file, JSON.stringify(data, null, 2) + '\n');
          }
          const history = JSON.parse(fs.readFileSync('version-history.json', 'utf8'));
          if (!history.some((entry) => entry.version === '1.8.2')) {
            history.unshift({version:'1.8.2',date:'2026-07-24',changes:['Restore all original Portal settings','Add System update settings without replacing existing content','Fix remaining generated JavaScript syntax errors']});
            fs.writeFileSync('version-history.json', JSON.stringify(history, null, 2) + '\n');
          }
          const changelog = fs.readFileSync('changelog.md', 'utf8');
          if (!changelog.startsWith('## 1.8.2')) fs.writeFileSync('changelog.md', '## 1.8.2\n\n- Restored all original Portal settings.\n- Added System update settings without replacing existing content.\n- Fixed remaining generated JavaScript syntax errors.\n\n' + changelog);
          NODE
      - name: Validate every JavaScript file
        run: find . -type f -name '*.js' -not -path './node_modules/*' -print0 | xargs -0 -n1 node --check
      - name: Publish Stable
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "hotfix: restore Settings and publish 1.8.2"
          git push origin HEAD:main

  cleanup-classes:
    if: github.ref == 'refs/heads/cleanup/unified-portal-classes'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: cleanup/unified-portal-classes
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Apply canonical Portal classes
        run: node scripts/cleanup-portal-classes.js
      - name: Commit generated cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "refactor(ui): remove legacy mc and view-specific classes"
          git push origin HEAD:cleanup/unified-portal-classes

  validate-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Test
        run: npm test

  validate-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Test
        run: npm test
