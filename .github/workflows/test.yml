name: Finalize SIRK Layout

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'chore/sirk-docs-1.5.140'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: chore/sirk-docs-1.5.140
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Apply final layout cleanup
        id: cleanup
        continue-on-error: true
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/finalize-sirk-layout.js')
          source = path.read_text(encoding='utf-8')
          source = source.replace(
              'walk(".github"), walk("public"), walk("server"), walk("scripts"), walk("test"),\n    walk("web"), walk("views"), walk("tools"), walk("seed")',
              'walk(".github"), walk("public"), walk("server"),\n    walk("web"), walk("views"), walk("tools"), walk("seed")'
          )
          source = source.replace(
              'observe\\(document\\.documentElement/',
              'observe\\\\(document\\\\.documentElement/'
          )
          source = source.replace(
              '"sirkPlatformPortalReturnHash", "sirkPortal.returnHash"',
              '"sirkPortalReturnHash", "sirkPortal.returnHash"'
          )
          path.write_text(source, encoding='utf-8')
          PY
          set -o pipefail
          node scripts/finalize-sirk-layout.js 2>&1 | tee cleanup-output.log
          python3 - <<'PY'
          from pathlib import Path
          replacements = [
              ('../core/', '../server/core/'),
              ('../modules/', '../server/modules/'),
              ('mycompany-data', 'sirk-platform-data'),
              ('meshcentral-mycompany', 'sirk-portal'),
              ('__MYCOMPANY_', '__SIRK_PLATFORM_'),
              ('__myCompany', '__sirkPlatform'),
              ('MYCOMPANY', 'SIRK_PLATFORM'),
              ('MyCompany', 'SirkPlatform'),
              ('myCompany', 'sirkPlatform'),
              ('mycompany', 'sirkPlatform')
          ]
          for path in Path('test').glob('*.js'):
              source = path.read_text(encoding='utf-8')
              for old, new in replacements:
                  source = source.replace(old, new)
              path.write_text(source, encoding='utf-8')
          PY
          cat > .github/workflows/test.yml <<'EOF'
          name: Test

          on:
            push:
              branches: [main]
            pull_request:

          permissions:
            contents: read

          jobs:
            validate-linux:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: '24'
                - run: npm test
            validate-windows:
              runs-on: windows-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-node@v4
                  with:
                    node-version: '24'
                - run: npm test
          EOF
      - name: Validate final tree
        if: steps.cleanup.outcome == 'success'
        shell: bash
        run: |
          set +e
          : > finalize-test-output.log
          git diff --check >> finalize-test-output.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            npm test >> finalize-test-output.log 2>&1
            status=$?
          fi
          if [ "$status" -eq 0 ]; then
            find . -type f -name '*.js' -not -path './node_modules/*' -print0 |
              xargs -0 -n1 node --check >> finalize-test-output.log 2>&1
            status=$?
          fi
          cat finalize-test-output.log
          exit "$status"
      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finalize-sirk-layout-output
          path: |
            cleanup-output.log
            finalize-test-output.log
          if-no-files-found: error
          retention-days: 1
      - name: Commit and push final tree
        if: steps.cleanup.outcome == 'success' && success()
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: finalize SIRK Platform repository layout'
          git push origin HEAD:chore/sirk-docs-1.5.140
      - name: Remove accidental helper branches
        if: steps.cleanup.outcome == 'success' && success()
        continue-on-error: true
        shell: bash
        run: |
          git push origin --delete \
            tmp-do-not-use \
            chore/sirk-docs-1.5.140-final \
            chore/sirk-docs-1.5.140-ready \
            chore/sirk-docs-1.5.140-merge
      - name: Fail after cleanup error
        if: steps.cleanup.outcome != 'success'
        run: exit 1
