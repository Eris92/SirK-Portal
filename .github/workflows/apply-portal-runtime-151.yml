name: Apply Portal runtime 1.5.151

on:
  push:
    branches:
      - hotfix/portal-runtime-assets-150

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[portal-151-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/portal-runtime-assets-150
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/finalize-portal-runtime-151.js
      - run: npm test
      - name: Commit generated runtime fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "hotfix: complete Portal runtime assets 1.5.151 [portal-151-applied]"
          git push origin HEAD:hotfix/portal-runtime-assets-150
