name: Portal class cleanup
on:
  workflow_dispatch:
  push:
    branches: [cleanup/unified-portal-classes]
    paths:
      - scripts/cleanup-portal-classes.js
      - .github/portal-class-cleanup-trigger
      - .github/workflows/portal-class-cleanup.yml
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/unified-portal-classes
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Normalize Portal classes
        run: node scripts/cleanup-portal-classes.js
      - name: Commit generated cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "refactor(ui): remove duplicate and redundant Portal classes"
          git push origin HEAD:cleanup/unified-portal-classes
      - name: Validate normalized frontend
        run: npm test
